<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Potentiel de Marée Pur</title>
    <style>
        body {
            margin: 0;
            background-color: #050510;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;

    
        }
        canvas {
            border: 1px solid #333;
            background-color: #020208;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: crosshair;
        }
        #info {
            margin-top: 15px;
            font-size: 15px;
            color: #aaa;
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
        }
        #versionBadge {
            position: fixed;
            right: 16px;
            bottom: 16px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.55);
            color: #d8eaff;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h2 style="margin: 5px;">Déformation Pure de l'Océan (Équation Globale)</h2>
    <canvas id="simCanvas" width="800" height="600"></canvas>
    <div id="info">
        Bougez la souris pour déplacer la <b>Lune</b>.<br>
        L'océan (en bleu) suit l'équation mathématique du potentiel : <br>
        <b>Forme = Rayon + Amplitude × (3cos²ψ - 1)</b><br>
        <span id="distanceInfo">Distance Terre-Lune : calcul en temps réel</span><br><br>
        <label style="cursor:pointer;">
            <input type="checkbox" id="autoOrbit"> Orbite automatique
        </label>
    </div>
    <div id="versionBadge">Version v1</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

const TERRE = { x: canvas.width / 2, y: canvas.height / 2, rayon: 120 };
let LUNE = { x: canvas.width * 0.8, y: canvas.height * 0.3, rayon: 15 };
const VERSION = 'v9';

// Amplitude de référence de la marée lorsque la Lune est à distance standard
const AMPLITUDE_MAREE = 15;
const DISTANCE_REF = 300;

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    LUNE.x = e.clientX - rect.left;
    LUNE.y = e.clientY - rect.top;
});

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Axe Terre-Lune
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
    ctx.lineWidth = 1;
    ctx.moveTo(TERRE.x, TERRE.y);
    ctx.lineTo(LUNE.x, LUNE.y);
    ctx.stroke();

    // Angle de la Lune par rapport à l'horizontale
    const dx = LUNE.x - TERRE.x;
    const dy = LUNE.y - TERRE.y;
    const distanceLune = Math.sqrt(dx * dx + dy * dy);
    const angleLune = Math.atan2(dy, dx);

    // L'effet de marée dépend de la distance Terre-Lune (∝ 1 / distance^3)
    const distanceFactor = Math.pow(DISTANCE_REF / distanceLune, 3);
    const amplitudeMareeReelle = AMPLITUDE_MAREE * distanceFactor;

    // 2. TRACÉ DE L'OCÉAN DÉFORMÉ (Ligne mathématique)
    ctx.beginPath();
    for (let i = 0; i <= 360; i++) {
        let angleTerre = (i * Math.PI) / 180; // Angle du point de la Terre qu'on examine
        
        // ψ (psi) est l'angle entre le point de la Terre et la Lune
        let psi = angleTerre - angleLune; 

        // Quadrupole (symétrique) + octupole (asymétrique, bourrelet lunaire > opposition)
        const octupole = (TERRE.rayon / distanceLune) * (5 * Math.pow(Math.cos(psi), 3) - 3 * Math.cos(psi));
        let deformation = amplitudeMareeReelle * ((3 * Math.cos(psi) * Math.cos(psi) - 1) + octupole);
        let rayonOcean = TERRE.rayon + deformation;

        let x = TERRE.x + Math.cos(angleTerre) * rayonOcean;
        let y = TERRE.y + Math.sin(angleTerre) * rayonOcean;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(0, 140, 255, 0.35)";
    ctx.fill();
    ctx.strokeStyle = "#00bfff";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 3. Dessiner le socle solide de la Terre (Cercle parfait de référence)
    ctx.beginPath();
    ctx.arc(TERRE.x, TERRE.y, TERRE.rayon, 0, Math.PI * 2);
    ctx.strokeStyle = "#17b978";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]); // Ligne pointillée pour voir l'écart
    ctx.stroke();
    ctx.setLineDash([]); // Reset
    
    // Centre O
    ctx.beginPath();
    ctx.arc(TERRE.x, TERRE.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.font = "14px sans-serif";
    ctx.fillText("O", TERRE.x - 15, TERRE.y - 10);

    const distanceInfo = document.getElementById('distanceInfo');
    if (distanceInfo) {
        distanceInfo.textContent = `Distance Terre-Lune : ${distanceLune.toFixed(0)} px — Intensité marée : ${distanceFactor.toFixed(2)}×`;
    }
    const versionBadge = document.getElementById('versionBadge');
    if (versionBadge) {
        versionBadge.textContent = `Version ${VERSION}`;
    }

    // 4. Dessiner la Lune
    ctx.beginPath();
    ctx.arc(LUNE.x, LUNE.y, LUNE.rayon, 0, Math.PI * 2);
    ctx.fillStyle = "#e1b382";
    ctx.fill();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
